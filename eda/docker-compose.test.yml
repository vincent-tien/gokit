# RabbitMQ test fixture for `make test-rabbitmq`.
# Spins up a single-node broker with the management UI at http://localhost:15672
# (guest/guest). Healthcheck gates `docker compose up --wait`.
services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gokit-eda-rabbitmq-test
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
